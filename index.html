  <h1>A propos de nous</h1>
  <div id="citation" class="text">Ressentir l'essentiel — KAN</div>
  <p>KAN — Ressentir l'essentiel

KAN vient du japonais 感 — kan — tiré du verbe kanjiru, « ressentir ». Ce kanji désigne ce qui se passe en nous avant les mots : une impression, une émotion, une réaction intérieure. Pas ce que l'on pense. Ce que l'on ressent.

C'est à partir de cette idée que la marque s'est construite, avec la conviction qu'un parfum touche quelque chose d'intime et d'instinctif, et que la qualité de ce qu'il provoque dépend directement de la qualité de ce dont il est fait.

KAN poursuit deux missions étroitement liées. La première est de recenser et d'évaluer les fournisseurs européens d'huiles essentielles et d'extraits CO2 biologiques, distillateurs, producteurs, coopératives, afin de constituer une cartographie précise de ces matières premières : leurs origines, leurs profils olfactifs, leurs méthodes d'obtention. La seconde est de créer des parfums élaborés exclusivement à partir de ces matières premières naturelles et biologiques, en travaillant chaque formule comme une composition sensible. KAN se veut une marque innovante, proposant une véritable alternative pour ceux qui souhaitent porter un parfum plus responsable et plus vert, sans compromis sur l'expérience olfactive.

Ces deux missions se nourrissent l'une l'autre : mieux connaître les matières premières, c'est mieux comprendre ce qu'elles peuvent exprimer. Et c'est, au fond, ce que KAN cherche : donner à ressentir quelque chose de juste.</p>
